version: '3.8'

services:
  notes-app:
    build: .
    container_name: notes-app
    ports:
      - "8080:8080"
    volumes:
      - notes-data:/app/data
    environment:
      - PORT=8080
      - DATA_DIR=/app/data
      - GIN_MODE=release
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/api/notes"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  notes-data:
