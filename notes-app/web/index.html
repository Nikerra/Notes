<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#667eea">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Заметки">
    <title>Заметки</title>
    <link rel="manifest" href="/static/manifest.json">
    <link rel="apple-touch-icon" href="/static/icon-192.png">
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="app">
        <header class="header">
            <h1>Заметки</h1>
            <div class="header-buttons">
                <button class="view-btn active" id="listViewBtn" title="Список">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="8" y1="6" x2="21" y2="6"></line>
                        <line x1="8" y1="12" x2="21" y2="12"></line>
                        <line x1="8" y1="18" x2="21" y2="18"></line>
                        <line x1="3" y1="6" x2="3.01" y2="6"></line>
                        <line x1="3" y1="12" x2="3.01" y2="12"></line>
                        <line x1="3" y1="18" x2="3.01" y2="18"></line>
                    </svg>
                </button>
                <button class="view-btn" id="calendarViewBtn" title="Календарь">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                        <line x1="16" y1="2" x2="16" y2="6"></line>
                        <line x1="8" y1="2" x2="8" y2="6"></line>
                        <line x1="3" y1="10" x2="21" y2="10"></line>
                    </svg>
                </button>
                <button class="sync-btn" id="syncBtn" title="Синхронизация">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
                    </svg>
                </button>
            </div>
        </header>

        <div class="controls" id="listControls">
            <button class="filter-btn active" data-filter="all">Все</button>
            <button class="filter-btn" data-filter="work">Работа</button>
            <button class="filter-btn" data-filter="personal">Личное</button>
            <button class="filter-btn" data-filter="overdue">Просроченные</button>
        </div>

        <div class="add-form">
            <input type="text" id="titleInput" placeholder="Новая заметка..." maxlength="100">
            <textarea id="contentInput" placeholder="Описание (необязательно)" maxlength="500"></textarea>
            <div class="add-form-row">
                <select id="categorySelect">
                    <option value="personal">Личное</option>
                    <option value="work">Работа</option>
                </select>
                <input type="datetime-local" id="dueDateInput" title="Срок выполнения">
            </div>
            <div class="add-form-row">
                <button id="addBtn" class="add-btn">Добавить</button>
            </div>
        </div>

        <div class="calendar-view" id="calendarView" style="display: none;">
            <div class="calendar-header">
                <button class="calendar-nav" id="prevMonth">&lt;</button>
                <h2 id="currentMonth"></h2>
                <button class="calendar-nav" id="nextMonth">&gt;</button>
            </div>
            <div class="calendar-grid">
                <div class="calendar-weekdays">
                    <div>Пн</div>
                    <div>Вт</div>
                    <div>Ср</div>
                    <div>Чт</div>
                    <div>Пт</div>
                    <div>Сб</div>
                    <div>Вс</div>
                </div>
                <div class="calendar-days" id="calendarDays"></div>
            </div>
            <div class="calendar-notes" id="calendarNotes"></div>
        </div>

        <div class="notes-list" id="notesList"></div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
